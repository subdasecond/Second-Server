  header: <aqua><u>Repaired Items</u></aqua>
  no-items-repaired: <gray>No items were able to be repaired</gray>
  other: <green><hover:show_text:'<items>'>You have repaired <target>'s items!</hover><green>
  self: <green><hover:show_text:'<items>'>Your items have been repaired!</hover></green>
