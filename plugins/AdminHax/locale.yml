    other: <grey><target>'s current <speedtype> is <value></grey>
    own: <grey>Your <speedtype> is currently set to <value></grey>
  reset:
    by-other: <green>Your <speedtype> has been reset by <initiator></green>
    other: <green><target>'s <speedtype> has been reset</green>
    own: <green>Your <speedtype> has been reset</green>
  set:
    by-other: <green>Your <speedtype> has been set to <value> by <initiator></green>
    other: <green>You set <target>'s <speedtype> to <value></green>
    own: <green>Your <speedtype> has been set to <value></green>
