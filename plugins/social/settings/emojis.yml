# Whether the emoji module should be enabled
enabled: true
# Text that appears when hovering over an emoji to indicate its aliases
hoverTextAliases: <blue>Alias(es):</blue> <gray>%s</gray>
# Text that appears when hovering over an emoji to let the player know that they can shift-click to insert the emoji
hoverTextInsertion: <dark_gray>Shift and click to insert in chatbox</dark_gray>
