# Whether customized system messages should be enabled
enabled: true
# Channel type
# Can be CHAT or ACTION_BAR
channelType: CHAT
# Whether the join message should be customized or not
customizeJoinMessage: true
# Message that will be sent to everyone when a player joins the server
joinMessage: <dark_gray>[<green>+</green>]</dark_gray> <white>$(clickable_nickname)</white>
# Delay in TICKS between the join event and the join message
joinMessageDelayInTicks: 1
# Whether the quit message should be customized or not
customizeQuitMessage: true
# Message that will be sent to everyone when a player quits the server
quitMessage: <dark_gray>[<red>-</red>]</dark_gray> <white>$(clickable_nickname)</white>
# Whether the death message should be customized or not
customizeDeathMessage: true
# Message that will be sent to everyone when a player dies
# %s = Vanilla death message
deathMessage: <dark_gray>[<white>:skull:</white>]</dark_gray> %s
