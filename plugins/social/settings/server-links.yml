# Whether custom server links should be enabled
# Server links are a feature introduced in snapshot 24w21a that adds custom links to the pause menu
enabled: true
# Use 'displayName' if you want the button to have custom text with colors, emojis...
# Use 'type' if you want the button to be translated depending on player's language
# List of types: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/ServerLinks.Type.html
links:
- displayName: <blue>:raw_comet:</blue> Website
  url: https://example.com
- displayName: <yellow>:raw_heart:</yellow> Donations
  url: https://example.com
- type: COMMUNITY_GUIDELINES
  url: https://example.com
- type: COMMUNITY
  url: https://discord.com
- type: SUPPORT
  url: https://example.com
