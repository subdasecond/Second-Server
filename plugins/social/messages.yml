# Message prefixes
errorPrefix: <dark_gray>[<red>:raw_x:</red>]</dark_gray>
warningPrefix: <dark_gray>[<yellow>:raw_warning:</yellow>]</dark_gray>
successPrefix: <dark_gray>[<green>:raw_checkmark:</green>]</dark_gray>
infoPrefix: <dark_gray>[<blue>:raw_comet:</blue>]</dark_gray>

# Enabling this will make messages show in action bar instead of using chat channels
useActionBar: false

# General errors
errors:
  cannotBeRunFromConsole: $(error_prefix) This command cannot be run from console.
  featureNotAvailable: $(error_prefix) <red>This feature isn't available in this server.</red>
  unexpectedError: $(error_prefix) <red>An unexpected error has occurred.</red>
  invalidCommand: '$(error_prefix) <red>Invalid command: <gray>%s</gray>.</red>'
  invalidArgument: $(error_prefix) <red>Invalid argument <gray>%s</gray> for type
    <gray>%s</gray>.</red>
  unknownAnnouncement: $(error_prefix) <red>Unknown announcement.</red>
  notEnoughPermission: $(error_prefix) <red>You do not have enough permission to do
    this.</red>
  notEnoughArguments: $(error_prefix) <red>Not enough arguments.</red>
  tooManyArguments: $(error_prefix) <red>Too many arguments.</red>
  nicknameAlreadyInUse: $(error_prefix) <red>This nickname belongs to another player.</red>
  nicknameTooLong: $(error_prefix) <red>Nicknames cannot exceed 16 characters.</red>
  typingTooFast: $(error_prefix) <red>You are typing too fast!</red>
  playerNotFound: $(error_prefix) <red>Unknown player.</red>
  chooseAnotherPlayer: $(error_prefix) <red>Choose another player.</red>
  channelDoesNotExist: $(error_prefix) <red>That channel does not exist.</red>
  unknownReaction: $(error_prefix) <red>Unknown reaction.</red>
  alreadyBelongsToAGroup: $(error_prefix) <red>You already belong to a group.</red>
  doesNotBelongToAGroup: $(error_prefix) <red>You don't belong to any group.</red>
  groupDoesNotExist: $(error_prefix) <red>That channel does not exist.</red>
  groupIsFull: $(error_prefix) <red>This group is full.</red>
  groupAliasTooLong: $(error_prefix) <red>Aliases cannot exceed 16 characters.</red>
  userIsAlreadyIgnored: $(error_prefix) <red>That user is already ignored.</red>
  userIsNotIgnored: $(error_prefix) <red>You are not ignoring that user.</red>
  cannotIgnoreYourself: $(error_prefix) <red>You cannot ignore yourself.</red>
  userHasIgnoredYou: $(error_prefix) <red>Your message has not been delivered since
    the recipient is ignoring you.</red>
  userIsAlreadyMuted: $(error_prefix) <red>That user is already muted.</red>
  cannotMuteYourself: $(error_prefix) <red>You cannot mute yourself.</red>
  userExcemptFromMute: $(error_prefix) <red>That user is excempt from being muted.</red>
    <gray>(social.mute.excempt)</gray>
  userIsNotMuted: $(error_prefix) <red>That user is not muted.</red>
  cannotSendMessageWhileMuted: $(error_prefix) <red>You cannot send messages in <yellow>$(channel)</yellow>
    since you have been muted.</red>

# Info messages
info:
  playerJoinedGroup: $(group_icon) <gray>$(clickable_nickname) has joined this group.</gray>
  playerLeftGroup: $(group_icon) <gray>$(clickable_nickname) has left this group.</gray>
  groupLeaderChange: $(group_icon) <gray>$(clickable_nickname) is now the leader of
    this group.</gray>
  groupDisbanded: $(group_icon) <gray>This group has been disbanded.</gray>
  userMuted: $(info_prefix) <gray>You have been muted in channel <yellow>$(channel)</yellow>.</gray>
  userUnmuted: $(info_prefix) <gray>You have been unmuted in channel <yellow>$(channel)</yellow>.</gray>
  userMutedGlobally: $(info_prefix) <gray>You have been muted globally.</gray>
  userUnmutedGlobally: $(info_prefix) <gray>You have been unmuted globally.</gray>
  userOpenedPrivateChannel: $(info_prefix) <gray>You have opened a <green>private
    channel</green> with $(formatted_nickname).</gray>

# Command messages
commands:
  channelChanged: $(info_prefix) <gray>You are now chatting in channel $(channel).</gray>
  channelChangedToPrivateMessage: $(info_prefix) <gray>You are now chatting with <blue>$(nickname)</blue>.</gray>
  nicknameChanged: $(info_prefix) <gray>Your nickname is now <blue>$(nickname)</blue>.</gray>
  nicknameChangedOthers: $(success_prefix) <gray><blue>%s</blue>'s nickname has been
    set to <green>%s</green></gray>
  nicknameReset: $(info_prefix) <gray>Your nickname has been reset.</gray>
  nicknameResetOthers: $(success_prefix) <gray><blue>%s</blue>'s name has been reset.</gray>
  moduleReloaded: $(success_prefix) <green>Module <blue>%s</blue> has been reloaded.</green>
  socialSpyStatusChanged: $(info_prefix) <gray>Social spy status has been set to $(socialspy).</gray>
  createdGroup: $(success_prefix) <green>You've created a new group. You can see the
    invite code by running <white><click:copy_to_clipboard:'%s'><hover:show_text:'<gray>Click
    here to copy to clipboard</gray>'>/group code</hover></click></white>. Other players
    can join the group by using <white>/group join <code></white>.</green>
  groupCode: $(info_prefix) <gray>Your group's code is <blue>$(group_code)</blue>.</gray>
  joinedGroup: $(success_prefix) <green>You've joined group <blue>$(group)</blue>.</green>
  leftGroup: $(success_prefix) <green>You've left group <blue>$(group)</blue>.</green>
  confirmDisbandAction: $(warning_prefix) <gray>This action cannot be undone! Type
    <blue>/group disband --confirm</blue> to confirm this action.</gray>
  groupDisbanded: $(success_prefix) <green>Your group has been disbanded.</green>
  groupAliasChanged: $(info_prefix) <gray>This group's alias has been set to <blue>$(group)</blue>,</gray>
  userIgnored: $(success_prefix) <gray>User <blue>%s</blue> has been ignored.</gray>
  userUnignored: $(success_prefix) <gray>User <blue>%s</blue> has been unignored.</gray>
  userMuted: $(success_prefix) <gray>User <blue>%s</blue> has been muted in channel
    <yellow>$(channel)</yellow>.</gray>
  userUnmuted: $(success_prefix) <gray>User <blue>%s</blue> has been unmuted in channel
    <yellow>$(channel)</yellow>.</gray>
  userMutedGlobally: $(success_prefix) <gray>User <blue>%s</blue> has been muted globally.</gray>
  userUnmutedGlobally: $(success_prefix) <gray>User <blue>%s</blue> has been unmuted
    globally.</gray>
  processorResult: '$(info_prefix) <blue>Result: </blue>'
  processorClickToAnnounce: $(warning_prefix) <gray>Click here to broadcast this message</gray>
  processorInfoParsers: $(info_prefix) %s <gray>registered parsers (<white>%s</white>
    groups)</gray>
  processorInfoParsersByType: '$(info_prefix) :raw_box_up_and_right: <gray>%s</gray>:
    %s'
