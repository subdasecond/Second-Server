#=================================================================================================#
#   Color Codes:
#=================================================================================================#
#   &0 = Black        &a = Bright Green   &o = Italic(Cursiv)
#   &1 = Dark Blue    &b = Aqua           &r = Reset
#   &2 = Dark Green   &c = Red
#   &3 = Dark Aqua    &d = Pink
#   &4 = Dark Red     &e = Yellow
#   &5 = Purple       &f = White
#   &6 = Gold         &k = Constantly changing characters
#   &7 = Gray         &l = Bold
#   &8 = Dark Gray    &m = Strike
#   &9 = Indigo       &n = Underline
language: en
