# &4 = Rouge foncé &e = Jaune
# &5 = Violet &f = Blanc
# &6 = Or &k = Caractères en constante évolution
# &7 = Gris &l = Gras
# &8 = Gris foncé &m = Frappe
# &9 = Indigo &n = Souligné

