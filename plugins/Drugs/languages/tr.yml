#================================================== ================================================#
# Genel bilgi:
#================================================== ================================================#
# Burada her şeyi düzenleyebilirsiniz ancak lütfen "verildiyse" ifadesini unutmayın.
# Eklenti olası tüm sunucularda kullanılabilir.
# Bununla birlikte, eklentiyi oluşturan kişi hatalar veya diğer şeyler için hiçbir sorumluluk kabul etmez.
# eklentiyle alakalı. Eklenti tekrar yüklenemez ve satılamaz.
# diğer kullanıcılara! Eklentinin farklı bir sürümüne ihtiyacınız varsa lütfen benimle iletişime geçin
# yukarıdaki iletişim seçeneklerini kullanarak.

#================================================== ================================================#
# Renk Kodları:
#================================================== ================================================#
# &0 = Siyah &a = Parlak Yeşil &o = İtalik(Cursiv)
# &1 = Koyu Mavi &b = Açık Mavi &r = Sıfırla
# &2 = Koyu Yeşil &c = Kırmızı
# &3 = Koyu Deniz Mavisi &d = Pembe
# &4 = Koyu Kırmızı &e = Sarı
# &5 = Mor &f = Beyaz
# &6 = Altın &k = Sürekli değişen karakterler
# &7 = Gri &l = Kalın
# &8 = Koyu Gri &m = Vuruş
# &9 = İndigo &n = Altı Çizili

